# --- General ---
set -g prefix C-a
unbind C-b
bind C-a send-prefix

set -g default-terminal "tmux-256color"
set-option -ga terminal-features ",xterm-256color:RGB"
set-option -g focus-events on
set -s escape-time 0           # Fixes that "crap" leakage at startup
set -g mouse on                # Enable mouse for resizing and selection
set -g history-limit 50000     # Big buffer for long C++ build logs
setw -g aggressive-resize on

# --- Navigation (Vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Better Splitting ---
bind | split-window -h -c "#{pane_current_path}" # Vertical split
bind - split-window -v -c "#{pane_current_path}" # Horizontal split

# --- Session Management ---
# Press Prefix + S to see a fuzzy-searchable list of all your projects/sessions
bind S choose-tree -s

# --- Plugins ---
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on' # Auto-restore last saved state on start


# --- Presets for screens ---
# Home (57" Ultra-Wide): 3 Columns (Kiro, Nvim, Build Stack)
# Home (Main-Right: 2 small on left, 1 big on right)
bind H select-layout even-horizontal \; \
       split-window -h -p 65 \; \
       select-pane -t 0 \; \
       split-window -v \; \
       select-pane -t 2

# Lab (Dual 32"): 2 Columns (Kiro, Nvim)
bind L select-layout even-horizontal \; resize-pane -t 1 -x 15% \; select-pane -t 2

# --- Worktree Shortcuts ---
bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
