[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 10 # Increase this to show more parent directories
truncate_to_repo = false # Don't truncate to the git root
truncation_symbol = "ÔÇª/"

[character]
success_symbol = "[Ô×£](bold green)"
error_symbol = "[Ô×£](bold red)"
vicmd_symbol = "[ÔØ«](bold yellow)"

[git_branch]
symbol = "´Éÿ "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = "([$all_status$ahead_behind]($style) )"
conflicted = "="
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
untracked = "?"
stashed = "$"
modified = "!"
staged = "+"
renamed = "┬╗"
deleted = "Ô£ÿ"

