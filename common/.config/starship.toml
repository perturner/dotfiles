[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 10 # Increase this to show more parent directories
truncate_to_repo = false # Don't truncate to the git root
truncation_symbol = "ÔÇŽ/"

[character]
success_symbol = "[Ô×ť](bold green)"
error_symbol = "[Ô×ť](bold red)"
vicmd_symbol = "[ÔŁ«](bold yellow)"

[git_branch]
symbol = "´Éś "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
style = "bold red"
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "=${count}"
ahead = "Ôçí${count}"
behind = "Ôçú${count}"
diverged = "ÔçĽÔçí${ahead_count}Ôçú${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "Ôťś${count}"

