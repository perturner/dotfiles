# --- System & User ---

[username]
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format = "[@$hostname](bold red) "
disabled = false

[cmd_duration]
min_time = 2000
format = "took [$duration](bold yellow) "

[memory_usage]
disabled = true
threshold = -1
symbol = "пЎҡ "
style = "bold dimmed white"
format = "[$symbol${ram}( ${swap})]($style) "

[battery]
disabled = true
