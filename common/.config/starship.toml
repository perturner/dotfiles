[directory]
style = "bold blue"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 10 # Increase this to show more parent directories
truncate_to_repo = false # Don't truncate to the git root
truncation_symbol = "вҖҰ/"

[character]
success_symbol = "[вһң](bold green)"
error_symbol = "[вһң](bold red)"
vicmd_symbol = "[вқ®](bold yellow)"

[git_branch]
symbol = "пҗҳ "
style = "bold purple"
format = "[$symbol$branch]($style) "

[git_status]
# Remove the global red style so each icon can use its own color
format = '([\[ $all_status$ahead_behind\]](white) )'

# Individual Statuses with Nerd Font Icons
conflicted = '[у°Ҝ“${count} ](bright-red)'
ahead      = '[у°¶Ј${count} ](bright-blue)'
behind     = '[у°¶Ў${count} ](bright-magenta)'
diverged   = '[у°¶Ј${ahead_count}у°¶Ў ${behind_count} ](bright-cyan)'
untracked  = '[п„Ё${count} ](bright-yellow)'
stashed    = '[у°Ҳҡ${count} ](bright-blue)'
modified   = '[у°Ҹ«${count} ](bright-yellow)'
staged     = '[у°җ—${count} ](bright-green)'
renamed    = '[у°‘•${count} ](bright-cyan)'
deleted    = '[у°Ҷҙ${count} ](red)'

#[git_status]
#style = "bold red"
#format = '([\[ $all_status$ahead_behind\]]($style) )'
#conflicted = "=${count} "
#ahead = "вҮЎ${count} "
#behind = "вҮЈ${count} "
#diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count} "
#untracked = "?${count} "
#stashed = "$${count} "
#modified = "!${count} "
#staged = "+${count} "
#renamed = "В»${count} "
#deleted = "вңҳ${count} "

