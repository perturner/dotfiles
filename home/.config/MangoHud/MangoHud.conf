# MangoHud.conf - Comprehensive Monitoring

# Global toggles
gpu_stats
cpu_stats
ram
vram
fps
frametime
engine_version
vulkan_driver_info
gpu_power
pci_dev=0000:01:00.0
# FPS counter
fps_limit=0
# fps_color=00FF00 # Green
# position=top-left
# offset_x=10
# offset_y=10

# Text scaling
text_size=1.0

# Colors for different elements
# cpu_color=00FF00
# gpu_color=00FFFF
# ram_color=FF00FF
# vram_color=FF00FF
# engine_color=FF00FF

# Position and size of the HUD
position=top-left
width=400 # Adjust as needed
height=200 # Adjust as needed

# Custom layout and displayed metrics
# You can customize what appears and in what order
# You can use "legacy_layout=0" to fully customize with text=<string>
# For now, let's use the default layout with more stats enabled.

# CPU metrics
cpu_temp
cpu_load
cpu_freq

# GPU metrics
gpu_temp
gpu_load
gpu_core_clock
gpu_mem_clock
gpu_fan

# RAM/VRAM
ram_used
vram_used

# Frametime graph (important for smoothness)
frametime_graph
frame_timing_values=100
frame_timing_labels=1

# Advanced stats (uncomment as desired)
# core_clocks
# memory_clocks
# media_clocks
# power_draw
# gpu_power_w
# gpu_power_percent
# gpu_voltage
# gpu_mem_temp
# cpu_power_w
# battery

# Logging (useful for performance analysis)
# log_interval=500 # Log every 500ms
# log_file=/tmp/mangohud_log.csv
# log_fps=1
# log_frametime=1
# log_gpu_stats=1
# log_cpu_stats=1
# log_ram=1
# log_vram=1

# Example for showing a custom text (useful for debugging or custom info)
# custom_text=My Custom Info
# custom_text_color=FFFF00
