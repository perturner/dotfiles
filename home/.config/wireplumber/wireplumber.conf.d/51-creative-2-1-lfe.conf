monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "alsa_output.pci-0000_04_00.0.analog-surround-21"
      }
    ]
    actions = {
      update-props = {
        channelmix.mix-lfe    = true
        channelmix.upmix      = true
        channelmix.lfe-cutoff = 80.0
      }
    }
  }
]
