# Theme Automation Configuration

# Source: "local" or "wallhaven"
WALLPAPER_SOURCE="wallhaven"

# Local Directory (for local source)
WALLPAPER_DIR="$HOME/Pictures/Wallpapers"

# Wallhaven API URL (Filtered for 32:9 / 7680x2160 equivalent)
WALLPAPER_URL="https://wallhaven.cc/api/v1/search?q=id:1&resolutions=7680x2160,3840x1080&sorting=random"

# GTK Settings
THEME_ICONS="Papirus-Dark"
THEME_CURSOR="Bibata-Modern-Classic"
THEME_FONT="FiraCode Nerd Font Mono"

# Logging
LOG_FILE="$HOME/.cache/theme-automation.log"
