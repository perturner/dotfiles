context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "2.1 System (Pure Downmix)"
            media.name       = "2.1 System"
            filter.graph = {
                nodes = [
                    # --- INPUTS ---
                    { type = builtin, name = inFL,  label = copy }
                    { type = builtin, name = inFR,  label = copy }
                    { type = builtin, name = inFC,  label = copy }
                    { type = builtin, name = inLFE, label = copy }
                    { type = builtin, name = inRL,  label = copy }
                    { type = builtin, name = inRR,  label = copy }

                    # --- MIXERS ---
                    # FL = 1.0 FL + 0.7 FC + 0.3 RL
                    { type = builtin, name = mixFL, label = mixer, control = { "Gain 1" = 1.0, "Gain 2" = 0.7, "Gain 3" = 0.3 } }
                    
                    # FR = 1.0 FR + 0.7 FC + 0.3 RR
                    { type = builtin, name = mixFR, label = mixer, control = { "Gain 1" = 1.0, "Gain 2" = 0.7, "Gain 3" = 0.3 } }

                    # LFE Pass-through
                    { type = builtin, name = mixLFE, label = mixer, control = { "Gain 1" = 1.0 } }
                ]

                links = [
                    # FL Path
                    { output = "inFL:Out", input = "mixFL:In 1" }
                    { output = "inFC:Out", input = "mixFL:In 2" }
                    { output = "inRL:Out", input = "mixFL:In 3" }

                    # FR Path
                    { output = "inFR:Out", input = "mixFR:In 1" }
                    { output = "inFC:Out", input = "mixFR:In 2" }
                    { output = "inRR:Out", input = "mixFR:In 3" }

                    # LFE Path (Direct Pass-through only)
                    # We rely on the sink's internal 'channelmix' for stereo crossover.
                    { output = "inLFE:Out", input = "mixLFE:In 1" }
                ]

                inputs = [ "inFL:In", "inFR:In", "inFC:In", "inLFE:In", "inRL:In", "inRR:In" ]
                outputs = [ "mixFL:Out", "mixFR:Out", "mixLFE:Out" ]
            }
            capture.props = {
                node.name      = "effect_input.virtual_2_1"
                media.class    = "Audio/Sink"
                audio.channels = 6
                audio.position = [ FL, FR, FC, LFE, RL, RR ]
            }
            playback.props = {
                node.name      = "effect_output.virtual_2_1"
                node.target    = "alsa_output.pci-0000_04_00.0.analog-surround-51"
                node.passive   = true
                audio.channels = 3 # FL, FR, LFE
                audio.position = [ FL, FR, LFE ]
            }
        }
    }
]