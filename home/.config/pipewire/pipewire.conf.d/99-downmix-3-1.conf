context.modules = [
    { name = libpipewire-module-filter-chain
        args = {
            node.description = "3.1 Downmix (Balanced)"
            media.name       = "3.1 Downmix Chain"
            filter.graph = {
                nodes = [
                    # --- INPUT NODES ---
                    { type = builtin, name = inFL,  label = copy }
                    { type = builtin, name = inFR,  label = copy }
                    { type = builtin, name = inFC,  label = copy }
                    { type = builtin, name = inLFE, label = copy }
                    { type = builtin, name = inRL,  label = copy }
                    { type = builtin, name = inRR,  label = copy }

                    # --- MIXER NODES ---
                    # Front Left: 0.8 Source + 0.3 Rear
                    # Sum = 1.1 (Slightly hot, but usually safe for games which allow headroom)
                    { type = builtin, name = mixFL, label = mixer, control = { "Gain 1" = 0.8, "Gain 2" = 0.3 } }
                    
                    # Front Right: 0.8 Source + 0.3 Rear
                    { type = builtin, name = mixFR, label = mixer, control = { "Gain 1" = 0.8, "Gain 2" = 0.3 } }

                    # Center: 1.0 (Pass-through if game uses it)
                    { type = builtin, name = mixFC, label = mixer, control = { "Gain 1" = 1.0 } }

                    # LFE: 1.0 (Pass-through)
                    { type = builtin, name = mixLFE, label = mixer, control = { "Gain 1" = 1.0 } }
                ]

                links = [
                    { output = "inFL:Out", input = "mixFL:In 1" }
                    { output = "inRL:Out", input = "mixFL:In 2" }
                    { output = "inFR:Out", input = "mixFR:In 1" }
                    { output = "inRR:Out", input = "mixFR:In 2" }
                    { output = "inFC:Out", input = "mixFC:In 1" }
                    { output = "inLFE:Out", input = "mixLFE:In 1" }
                ]

                inputs = [ "inFL:In", "inFR:In", "inFC:In", "inLFE:In", "inRL:In", "inRR:In" ]
                outputs = [ "mixFL:Out", "mixFR:Out", "mixFC:Out", "mixLFE:Out" ]
            }
            capture.props = {
                node.name      = "effect_input.downmix_3_1"
                media.class    = "Audio/Sink"
                audio.channels = 6
                audio.position = [ FL, FR, FC, LFE, RL, RR ]
            }
            playback.props = {
                node.name      = "effect_output.downmix_3_1"
                node.target    = "alsa_output.pci-0000_04_00.0.analog-surround-51"
                node.passive   = true
                audio.channels = 4
                audio.position = [ FL, FR, FC, LFE ]
            }
        }
    }
]
