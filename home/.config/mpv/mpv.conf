# MPV configuration optimized for Streamlink (live streaming)

# Hardware decoding to offload video processing to the GPU
# Switch to NVDEC (Nvidia) for direct decoding on the 5090
# This avoids the expensive copy path (iGPU -> RAM -> dGPU)
# hwdec=nvdec

# Video output driver and preferred GPU backend
vo=gpu-next
gpu-api=opengl
gpu-context=wayland

# Hardware decoding using Nvidia NVDEC
hwdec=nvdec
vd-lavc-threads=4

# --- High Quality Scaling & Shaders ---
scale=ewa_lanczossharp
dscale=mitchell
cscale=mitchell
glsl-shader="~/.config/mpv/shaders/FSR.glsl"

# --- Interpolation (Smooth Motion) ---
# Optimized for high refresh rate screens like the 240Hz G9
video-sync=display-resample
interpolation=yes
tscale=oversample # Cleanest look for high refresh rates

# --- HDR & Color Management ---
# Use a profile that only activates for HDR content
target-colorspace-hint=no # Disable by default for SDR (Twitch)

[hdr-content]
profile-cond=get("video-params/sig-peak", 0) > 1
profile-restore=copy
target-colorspace-hint=yes
gpu-next-groups=yes
# Tone mapping for the Neo G9's high peak brightness
tone-mapping=bt.2446a
target-peak=1000

# Better color handling and dithering
dither-depth=auto
temporal-dither=yes

# Automatically deinterlace if needed
deinterlace=auto

# Disable on-screen controller (OSC) to reduce CPU overhead
osc=no

# Cache settings
cache=yes
demuxer-max-bytes=400MiB
demuxer-max-back-bytes=100MiB
cache-secs=120
